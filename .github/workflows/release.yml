name: Release

on:
  push:
    tags:
      - "v*"
env:
  PROJECT_NAME: camp.d

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    environment: release
    steps:

      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF:10}" >> "$GITHUB_ENV"

      - name: Show release version
        shell: bash
        run: echo "$RELEASE_VERSION"

      - name: Create tarball
        id: package
        shell: bash
        run: |
          PKG_SUFFIX=".tar.gz"
          PKG_BASENAME="${PROJECT_NAME}-${RELEASE_VERSION}"
          PKG_NAME="${PKG_BASENAME}${PKG_SUFFIX}"
          PKG_STAGING="/tmp/package"
          ARCHIVE_DIR="${PKG_STAGING}/${PKG_BASENAME}"
          mkdir -p "${ARCHIVE_DIR}"
          # Copy everything except .git to avoid bloating the archive
          rsync -a --exclude='.git' . "${ARCHIVE_DIR}/"
          pushd "${PKG_STAGING}/" >/dev/null
          tar czf "${PKG_NAME}" "${PKG_BASENAME}/"
          popd >/dev/null
          echo "PKG_NAME=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "PKG_PATH=${PKG_STAGING}/${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate a changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: .cliff.toml
          args: -vv --strip header --current
        env:
          OUTPUT: CHANGELOG.md

      - name: Print the changelog
        env:
          CHANGELOG: ${{ steps.git-cliff.outputs.changelog }}
        run: cat "$CHANGELOG"

      - name: Set prerelease flag
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == *alpha* ]] || [[ "$GIT_REF" == *beta* ]]; then
            echo "PRERELEASE_FLAG=--prerelease" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PKG_PATH: ${{ steps.package.outputs.PKG_PATH }}
          CHANGELOG: ${{ steps.git-cliff.outputs.changelog }}
        run: |
          RELEASE_ARGS=()
          [[ -n "$PRERELEASE_FLAG" ]] && RELEASE_ARGS+=("$PRERELEASE_FLAG")

          gh release create "$RELEASE_VERSION" \
            "$PKG_PATH" \
            --title "$RELEASE_VERSION" \
            --notes-file "$CHANGELOG" \
            "${RELEASE_ARGS[@]}"
