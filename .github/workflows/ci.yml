name: CI

on: [push, pull_request]

jobs:

  code_quality:
    name: Code quality
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2.75.1
        with:
          tool: just,dprint,typos-cli

      - run: just qq

  msv:
    name: Minimum supported version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: .emacs.d
        persist-credentials: false

    - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # v8.0
      with:
        version: 30.2

    - name: Check emacs version
      run: emacs --version

    - name: Test the config
      run: emacs --batch
